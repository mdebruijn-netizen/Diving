name = "aquameet-api"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Per-session live scoring rooms.
[[durable_objects.bindings]]
name = "SESSIONS"
class_name = "SessionDO"

[[migrations]]
tag = "v1"
new_classes = ["SessionDO"]

# Tenant database. Apply apps/api/migrations/0001_init.sql on provisioning.
[[d1_databases]]
binding = "DB"
database_name = "aquameet"
database_id = "4850f07c-fb62-46d4-a5d8-b389e4fa8b96"

# Object storage for documents, result exports and dive video.
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "aquameet"
