name = "aquameet-api"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Per-session live scoring rooms.
[[durable_objects.bindings]]
name = "SESSIONS"
class_name = "SessionDO"

[[migrations]]
tag = "v1"
new_classes = ["SessionDO"]

# Tenant database. Apply packages/persistence SCHEMA_SQL on provisioning.
[[d1_databases]]
binding = "DB"
database_name = "aquameet"
database_id = "00000000-0000-0000-0000-000000000000"
