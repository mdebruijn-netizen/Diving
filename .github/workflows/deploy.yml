name: Deploy

# Production deploy: every push to main ships to Cloudflare (Worker + Pages).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Gate the deploy on a green build.
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build:frontends

      - name: Deploy API Worker (+ Durable Object, D1 binding)
        run: pnpm exec wrangler deploy
        working-directory: apps/api

      - name: Ensure Pages projects exist
        run: |
          pnpm exec wrangler pages project create aquameet-web   --production-branch main || true
          pnpm exec wrangler pages project create aquameet-judge --production-branch main || true
          pnpm exec wrangler pages project create aquameet-admin --production-branch main || true

      - name: Deploy Pages (results/scoreboard, judge, admin)
        run: |
          pnpm exec wrangler pages deploy apps/web/dist   --project-name aquameet-web   --branch main
          pnpm exec wrangler pages deploy apps/judge/dist --project-name aquameet-judge --branch main
          pnpm exec wrangler pages deploy apps/admin/dist --project-name aquameet-admin --branch main
